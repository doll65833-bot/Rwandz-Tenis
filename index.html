<!DOCTYPE html>
<html lang="ku">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RAWANDZ TENNIS</title>

<style>

body{
margin:0;
overflow:hidden;
background:black;
font-family:tahoma;
}

canvas{
display:block;
}

#title{
position:absolute;
top:10px;
width:100%;
text-align:center;
font-size:45px;
font-weight:bold;
color:white;
z-index:100;
text-shadow:0 0 25px cyan;
}

#score{
position:absolute;
top:70px;
width:100%;
text-align:center;
font-size:30px;
color:white;
z-index:100;
}

#menu{
position:absolute;
left:20px;
top:20px;
z-index:100;
}

button{
padding:12px 20px;
border:none;
border-radius:12px;
background:#00b894;
color:white;
font-size:16px;
cursor:pointer;
margin:5px;
}

button:hover{
background:#00d9a7;
}

#about{
position:absolute;
left:20px;
bottom:20px;
width:320px;
padding:15px;
border-radius:15px;
background:rgba(0,0,0,0.8);
color:white;
display:none;
z-index:100;
}

#roomPanel{
position:absolute;
top:130px;
left:50%;
transform:translateX(-50%);
padding:20px;
border-radius:15px;
background:rgba(0,0,0,0.8);
color:white;
z-index:100;
}

input{
padding:10px;
border:none;
border-radius:10px;
margin:5px;
width:220px;
}

#chat{
position:absolute;
right:20px;
bottom:20px;
width:300px;
height:350px;
background:rgba(0,0,0,0.8);
border-radius:15px;
overflow:hidden;
z-index:100;
}

#messages{
height:280px;
overflow:auto;
padding:10px;
color:white;
font-size:14px;
}

#chatInput{
width:65%;
}

#ranking{
position:absolute;
right:20px;
top:20px;
width:220px;
padding:15px;
background:rgba(0,0,0,0.8);
border-radius:15px;
color:white;
z-index:100;
}

</style>

</head>

<body>

<div id="title">
🏓 RAWANDZ TENNIS
</div>

<div id="score">
Player 1 : 0 | Player 2 : 0
</div>

<div id="menu">

<button onclick="toggleAbout()">
دەربارە
</button>

<button onclick="window.open('https://wa.me/9647821131517')">
WhatsApp
</button>

</div>

<div id="about">

<h2>دەربارەی یاری</h2>

<p>
RAWANDZ TENNIS
</p>

<p>
دروستکەری یاری:
<b>Akam Ibrahim</b>
</p>

<p>
WhatsApp:
<br>
<a style="color:cyan"
href="https://wa.me/9647821131517">
+9647821131517
</a>
</p>

</div>

<div id="roomPanel">

<h3>ROOM CODE</h3>

<input id="roomInput" placeholder="Enter Room Code">

<br>

<button onclick="createRoom()">
Create Room
</button>

<button onclick="joinRoom()">
Join Room
</button>

</div>

<div id="ranking">

<h3>🏆 Ranking</h3>

<p>1 - Akam : 1200</p>
<p>2 - Guest : 900</p>
<p>3 - Player : 700</p>

</div>

<div id="chat">

<div id="messages"></div>

<input id="chatInput" placeholder="Message">

<button onclick="sendMessage()">
Send
</button>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getDatabase,
ref,
set,
push,
onValue
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

import * as THREE
from "https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.module.js";

const firebaseConfig = {

apiKey: "AIzaSyCuoMfqPAw95eJDkv1bmSSWiAC0Npv1khM",

authDomain: "rwandz-tenis.firebaseapp.com",

databaseURL:
"https://rwandz-tenis-default-rtdb.firebaseio.com",

projectId: "rwandz-tenis",

storageBucket:
"rwandz-tenis.firebasestorage.app",

messagingSenderId: "166843137666",

appId:
"1:166843137666:web:07de5c22d66917b388be9b",

measurementId: "G-KEJWYGQKZG"

};

const app = initializeApp(firebaseConfig);

const db = getDatabase(app);

window.toggleAbout=function(){

let box=document.getElementById("about");

box.style.display=
box.style.display==="block"
?
"none"
:
"block";

}

window.createRoom=function(){

let room=
Math.random().toString(36)
.substring(2,8);

document.getElementById("roomInput").value=room;

set(ref(db,"rooms/"+room),{

created:true

});

alert("Room Created : "+room);

}

window.joinRoom=function(){

let room=
document.getElementById("roomInput").value;

alert("Joined Room : "+room);

}

window.sendMessage=function(){

let msg=
document.getElementById("chatInput").value;

if(msg==="") return;

push(ref(db,"chat"),{

message:msg

});

document.getElementById("chatInput").value="";

}

onValue(ref(db,"chat"),(snapshot)=>{

let data=snapshot.val();

let html="";

for(let id in data){

html +=
"<p>"+data[id].message+"</p>";

}

document.getElementById("messages").innerHTML=html;

});



// THREE JS

const scene = new THREE.Scene();

scene.background =
new THREE.Color(0x050505);

const camera =
new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
1000
);

const renderer =
new THREE.WebGLRenderer({
antialias:true
});

renderer.setSize(
window.innerWidth,
window.innerHeight
);

renderer.shadowMap.enabled=true;

document.body.appendChild(renderer.domElement);



// LIGHT

const ambient =
new THREE.AmbientLight(
0xffffff,
0.9
);

scene.add(ambient);

const light =
new THREE.DirectionalLight(
0xffffff,
2
);

light.position.set(0,20,10);

light.castShadow=true;

scene.add(light);



// STADIUM

const stadiumGeo =
new THREE.CylinderGeometry(
40,
40,
10,
64
);

const stadiumMat =
new THREE.MeshPhongMaterial({
color:0x222222
});

const stadium =
new THREE.Mesh(
stadiumGeo,
stadiumMat
);

stadium.position.y=-6;

scene.add(stadium);



// TABLE

const tableGeo =
new THREE.BoxGeometry(
12,
0.5,
6
);

const tableMat =
new THREE.MeshPhongMaterial({
color:0x006400
});

const table =
new THREE.Mesh(
tableGeo,
tableMat
);

table.receiveShadow=true;

scene.add(table);



// NET

const netGeo =
new THREE.BoxGeometry(
0.1,
1,
6
);

const netMat =
new THREE.MeshPhongMaterial({
color:0xffffff
});

const net =
new THREE.Mesh(
netGeo,
netMat
);

net.position.y=0.8;

scene.add(net);



// PLAYER 1

const paddleGeo =
new THREE.BoxGeometry(
0.3,
1,
1.5
);

const paddle1 =
new THREE.Mesh(
paddleGeo,
new THREE.MeshPhongMaterial({
color:0xff0000
})
);

paddle1.position.set(-5,1,0);

scene.add(paddle1);



// PLAYER 2

const paddle2 =
new THREE.Mesh(
paddleGeo,
new THREE.MeshPhongMaterial({
color:0x00aaff
})
);

paddle2.position.set(5,1,0);

scene.add(paddle2);



// BALL

const ballGeo =
new THREE.SphereGeometry(
0.25,
32,
32
);

const ballMat =
new THREE.MeshPhongMaterial({
color:0xffffff
});

const ball =
new THREE.Mesh(
ballGeo,
ballMat
);

ball.position.y=1;

scene.add(ball);

camera.position.z=12;
camera.position.y=8;
camera.rotation.x=-0.5;

let speedX=0.12;
let speedZ=0.09;

let keys={};

document.addEventListener(
"keydown",
(e)=>{
keys[e.key]=true;
});

document.addEventListener(
"keyup",
(e)=>{
keys[e.key]=false;
});



// SOUND

const hitSound =
new Audio(
'https://cdn.pixabay.com/audio/2022/03/15/audio_115b9b0f43.mp3'
);



// GAME LOOP

function animate(){

requestAnimationFrame(animate);

if(keys["w"])
paddle1.position.z-=0.15;

if(keys["s"])
paddle1.position.z+=0.15;

if(keys["ArrowUp"])
paddle2.position.z-=0.15;

if(keys["ArrowDown"])
paddle2.position.z+=0.15;

ball.position.x+=speedX;
ball.position.z+=speedZ;

if(ball.position.z>2.8 ||
ball.position.z<-2.8){

speedZ*=-1;

}

if(
ball.position.x<-4.7 &&
ball.position.z<
paddle1.position.z+1 &&
ball.position.z>
paddle1.position.z-1
){

speedX*=-1;

hitSound.play();

}

if(
ball.position.x>4.7 &&
ball.position.z<
paddle2.position.z+1 &&
ball.position.z>
paddle2.position.z-1
){

speedX*=-1;

hitSound.play();

}

renderer.render(
scene,
camera
);

}

animate();

window.addEventListener(
'resize',
()=>{

camera.aspect=
window.innerWidth/window.innerHeight;

camera.updateProjectionMatrix();

renderer.setSize(
window.innerWidth,
window.innerHeight
);

}
);

</script>

</body>
</html>
